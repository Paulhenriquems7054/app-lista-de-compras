<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Título - Organização</title>
    <link rel="stylesheet" href="apresentacao.css">
</head>
<body>
    <div style="background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="text-align: center; max-width: 600px;">
            <h1 style="color: white; margin-bottom: 2rem;">🧪 Teste de Organização do Título</h1>
            
            <!-- Título como está na apresentação -->
            <h1 class="title" id="title">
                <div class="title-line">
                    <span class="letter">L</span><span class="letter">I</span><span class="letter">S</span><span class="letter">T</span><span class="letter">A</span>
                    <span class="letter space"> </span>
                    <span class="letter">D</span><span class="letter">E</span>
                    <span class="letter space"> </span>
                    <span class="letter">C</span><span class="letter">O</span>
                </div>
                <div class="title-line">
                    <span class="letter">M</span><span class="letter">P</span><span class="letter">R</span><span class="letter">A</span><span class="letter">S</span>
                </div>
            </h1>
            
            <div style="background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; margin-top: 2rem;">
                <h3 style="color: #4ECDC4; margin-bottom: 1rem;">📋 Verificação:</h3>
                <p style="color: #e0e0e0; margin: 0.5rem 0;">
                    ✅ <strong>Linha 1:</strong> "LISTA DE CO" (horizontal)
                </p>
                <p style="color: #e0e0e0; margin: 0.5rem 0;">
                    ✅ <strong>Linha 2:</strong> "MPRAS" (horizontal)
                </p>
                <p style="color: #e0e0e0; margin: 0.5rem 0;">
                    ✅ <strong>Centralizado:</strong> Ambas as linhas
                </p>
                <p style="color: #e0e0e0; margin: 0.5rem 0;">
                    ✅ <strong>Espaçamento:</strong> Apropriado entre linhas
                </p>
            </div>
            
            <div style="margin-top: 2rem;">
                <a href="/apresentacao.html" style="
                    background: linear-gradient(135deg, #4ECDC4, #6BCB77);
                    color: white; padding: 15px 30px; border-radius: 25px;
                    text-decoration: none; font-weight: bold; display: inline-block;
                    margin: 10px;">
                    🎨 Ver Apresentação Completa
                </a>
                
                <button onclick="location.reload()" style="
                    background: linear-gradient(135deg, #6BCB77, #4ECDC4);
                    color: white; padding: 15px 30px; border-radius: 25px;
                    border: none; font-weight: bold; cursor: pointer;
                    margin: 10px;">
                    🔄 Recarregar Teste
                </button>
            </div>
        </div>
    </div>
</body>
</html>
