<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-4">
                Teste Tailwind CSS
            </h1>
            
            <!-- Botão de teste igual ao do menu -->
            <button class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-gradient-to-br from-green-400 to-green-600 hover:from-green-600 hover:to-green-800 text-white transition-all shadow-xl hover:shadow-2xl transform hover:scale-105 active:scale-95 relative min-w-[70px]">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
                <span class="font-extrabold text-base">MENU</span>
            </button>
            
            <div class="mt-4 p-4 bg-green-100 rounded-lg">
                <p class="text-green-800">
                    ✅ Se você vê este botão verde "MENU" com estilo, o Tailwind está funcionando!
                </p>
            </div>
            
            <div class="mt-4">
                <a href="http://localhost:3004/" class="text-blue-600 hover:text-blue-800 underline">
                    ← Voltar para o app principal
                </a>
            </div>
        </div>
    </div>
</body>
</html>
