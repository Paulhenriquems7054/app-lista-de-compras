<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="512" cy="512" r="512" fill="#4ECDC4" opacity="0.1"/>
  
  <!-- Shopping basket -->
  <path d="M300 400h424c22 0 40 18 40 40v200c0 22-18 40-40 40H300c-22 0-40-18-40-40V440c0-22 18-40 40-40z" 
