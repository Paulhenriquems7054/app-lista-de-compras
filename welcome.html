<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras IA</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script>
        // Detectar se é a primeira visita
        const hasVisited = localStorage.getItem('hasVisitedBefore');
        
        if (!hasVisited) {
            // Primeira visita - mostrar apresentação
            localStorage.setItem('hasVisitedBefore', 'true');
            window.location.href = 'apresentacao.html';
        } else {
            // Já visitou - ir direto para o app
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; font-family: sans-serif;">
        <p>Carregando...</p>
    </div>
</body>
</html>
