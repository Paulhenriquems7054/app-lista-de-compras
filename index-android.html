
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Título e descrição -->
    <title>Lista de Compras IA</title>
    <meta name="description" content="Gerencie suas compras de forma inteligente" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Meta tags para PWA -->
    <meta name="theme-color" content="#4ECDC4" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.24.0"
  }
}
</script>
</head>
  <body class="bg-light-gray dark:bg-dark-bg text-dark-gray dark:text-light-gray">
    <div id="root"></div>
    
    <!-- Loading indicator -->
    <div id="loading" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #4ECDC4; font-family: sans-serif;">
      <div style="font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite;">🛒</div>
      <div style="font-size: 18px; font-weight: bold;">Lista de Compras IA</div>
      <div style="font-size: 14px; color: #666; margin-top: 10px;">Carregando app...</div>
    </div>
    
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
    
    <script>
      console.log('🚀 App Android iniciando...');
      console.log('📍 Location:', window.location.href);
      
      // Remover loading quando React carregar
      window.addEventListener('DOMContentLoaded', () => {
        console.log('📄 DOM carregado');
      });
    </script>
    
    <!-- Script principal do React -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
